services:
  - type: web
    name: fitsaas-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build --workspace=apps/api && npx prisma db push --schema=packages/database/prisma/schema.prisma
    startCommand: npm start --workspace=apps/api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
